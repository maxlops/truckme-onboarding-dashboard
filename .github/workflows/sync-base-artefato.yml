name: Sincronizar Base_Artefato

on:
  workflow_dispatch:
  schedule:
    # 08h, 10h, 12h, 14h, 16h e 18h em America/Bahia (UTC-3).
    - cron: "0 11,13,15,17,19,21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: sync-base-artefato
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CSV_URL: https://docs.google.com/spreadsheets/d/e/2PACX-1vRbzJ2rbgISonV_XoKmijfzTCT9KFuxcYbEEiUvYbA2g3QNIaNg40eU_9xVgUlB1k8vKmySLKqZ0yQB/pub?gid=920918118&single=true&output=csv

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Baixar e validar Base_Artefato
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          tmp_file="$(mktemp)"

          curl             --fail             --silent             --show-error             --location             --retry 3             --retry-all-errors             --connect-timeout 15             --max-time 60             "$CSV_URL"             --output "$tmp_file"

          if [ ! -s "$tmp_file" ]; then
            echo "::error::O Google Sheets retornou um arquivo vazio."
            exit 1
          fi

          if ! head -n 1 "$tmp_file" | grep -q '^Cliente,'; then
            echo "::error::Cabeçalho inesperado; o snapshot anterior foi preservado."
            exit 1
          fi

          if [ "$(awk 'END { print NR }' "$tmp_file")" -lt 2 ]; then
            echo "::error::O CSV não contém linhas de dados; o snapshot anterior foi preservado."
            exit 1
          fi

          mv "$tmp_file" data/base-artefato.csv

      - name: Publicar somente quando houver mudança
        shell: bash
        run: |
          set -euo pipefail
          git add data/base-artefato.csv

          if git diff --cached --quiet; then
            echo "Base_Artefato já está atualizada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Atualiza snapshot da Base_Artefato"
          git push origin "HEAD:$GITHUB_REF_NAME"
